name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-test-analyze:
    name: Build, Test & SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # 1. Checkout repository
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full clone required so SonarCloud can assign correct
          # blame/authorship data and analyze pull-request diffs.
          fetch-depth: 0

      # ---------------------------------------------------------
      # 2. Setup Node.js 20 (frontend)
      # ---------------------------------------------------------
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ---------------------------------------------------------
      # 3. Setup Python (backend)
      # ---------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # ---------------------------------------------------------
      # 4. Install frontend dependencies
      # ---------------------------------------------------------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ---------------------------------------------------------
      # 5. Lint frontend
      # ---------------------------------------------------------
      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      # ---------------------------------------------------------
      # 6. Run frontend tests and generate coverage
      # ---------------------------------------------------------
      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run coverage

      # ---------------------------------------------------------
      # 7. Install backend dependencies
      # ---------------------------------------------------------
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------------------------
      # 8. Run backend tests and generate coverage
      # ---------------------------------------------------------
      - name: Run backend tests with coverage
        working-directory: backend
        run: pytest

      # ---------------------------------------------------------
      # 9. Run SonarCloud Scan
      # ---------------------------------------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ---------------------------------------------------------
      # 10. Fail the pipeline if the Quality Gate fails
      # ---------------------------------------------------------
      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
