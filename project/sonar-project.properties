# =========================================================
# SonarCloud Project Configuration
# Replace the two identifiers below with your own values
# (found on https://sonarcloud.io under "Administration > General Settings")
# =========================================================


sonar.projectKey=PadalaSiddharth0526_sonarcloud-devops-project
sonar.organization=padalasiddharth0526

# Human readable name shown in the SonarCloud dashboard
sonar.projectName=SonarCloud CI/CD Demo

# -----------------------------------------------------------------
# Source & test locations
# -----------------------------------------------------------------
# Frontend source lives in frontend/src, backend source lives in backend/
sonar.sources=frontend/src,backend
sonar.tests=frontend/src,backend/tests
sonar.test.inclusions=frontend/src/**/*.test.js,frontend/src/**/*.test.jsx,backend/tests/**/test_*.py

# Exclude test files themselves from being scanned as "sources"
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.test.jsx,**/venv/**,**/.venv/**,**/__pycache__/**

# -----------------------------------------------------------------
# Coverage report paths (generated by the CI pipeline before the scan)
# -----------------------------------------------------------------
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=backend/coverage.xml

# -----------------------------------------------------------------
# Language specific settings
# -----------------------------------------------------------------
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8

# -----------------------------------------------------------------
# Quality Gate: fail the pipeline if it does not pass
# (enforced by the sonarqube-quality-gate-action step in the workflow)
# -----------------------------------------------------------------
